<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Règles — I2N</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232563eb'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-size='13' font-weight='700' fill='white'%3EAD%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/regles.css">
</head>
<body>
    <header>
        <div class="header-left">
            <nav class="header-nav">
                <a href="/explorer" class="nav-link">Explorateur AD</a>
                <a href="/regles" class="nav-link active">Règles</a>
                <a href="/index.html" class="nav-link">Groupes Dynamiques</a>
            </nav>
        </div>
        <div class="header-right">
            <span class="badge-readonly">Lecture seule</span>
        </div>
    </header>

    <div class="regles-layout">

        <!-- Sidebar : liste des règles -->
        <aside class="regles-sidebar">
            <div class="regles-sidebar-hdr">
                <span class="regles-sidebar-title">Règles définies</span>
                <div class="sidebar-hdr-actions">
                    <button id="btn-view-json" class="btn-json" title="Voir le fichier JSON brut">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M8 3H6a2 2 0 0 0-2 2v4a2 2 0 0 1-2 2 2 2 0 0 1 2 2v4c0 1.1.9 2 2 2h2"/>
                            <path d="M16 3h2a2 2 0 0 1 2 2v4a2 2 0 0 0 2 2 2 2 0 0 0-2 2v4a2 2 0 0 1-2 2h-2"/>
                        </svg>
                    </button>
                    <button id="btn-new-rule" class="btn-primary-sm">+ Nouvelle règle</button>
                </div>
            </div>
            <div class="regles-list" id="regles-list">
                <p class="hint">Chargement…</p>
            </div>
        </aside>

        <!-- Zone principale : formulaire -->
        <main class="regles-main" id="regles-main">
            <div class="regles-empty">
                <p>Sélectionner une règle ou créer une nouvelle règle</p>
            </div>
        </main>

    </div>

    <div id="toast" class="toast" aria-live="polite"></div>

    <!-- Modal JSON -->
    <div id="json-modal" class="json-modal-overlay" hidden>
        <div class="json-modal-box">
            <div class="json-modal-header">
                <div class="json-modal-title-wrap">
                    <span class="json-modal-icon">{ }</span>
                    <span class="json-modal-title">regles.json</span>
                    <span class="json-modal-count" id="json-rule-count"></span>
                </div>
                <div class="json-modal-actions">
                    <button id="btn-json-copy" class="btn-json-copy">Copier</button>
                    <button id="btn-json-close" class="json-modal-close" title="Fermer">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                            <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="json-modal-body">
                <pre id="json-content" class="json-pre"></pre>
            </div>
        </div>
    </div>

    <script src="/regles.js"></script>
</body>
</html>
