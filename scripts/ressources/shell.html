<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I2N — Administration AD</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232563eb'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-size='13' font-weight='700' fill='white'%3EAD%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="/style.css">
    <style>
        body, html { margin: 0; height: 100%; overflow: hidden; }
        .tab-frame {
            display: none;
            width: 100%;
            height: calc(100vh - 52px);
            border: none;
        }
        .tab-frame.active { display: block; }
        .nav-badge {
            display: inline-block;
            margin-left: 7px;
            min-width: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: #dbeafe;
            color: #2563eb;
            font-size: 11px;
            font-weight: 700;
            line-height: 17px;
            text-align: center;
            vertical-align: middle;
        }
        .nav-badge[hidden] { display: none; }

        /* Bandeau bloquant (filigrane) pendant la génération des pages GROUPES */
        #app-overlay {
            position: fixed; inset: 0; z-index: 99999;
            display: flex; align-items: center; justify-content: center;
            background: rgba(244,245,247,.78);
            backdrop-filter: blur(2px);
            cursor: wait;
        }
        #app-overlay[hidden] { display: none; }
        #app-overlay .ov-box {
            display: flex; flex-direction: column; align-items: center; gap: 22px;
            padding: 30px 46px; border: 3px dashed rgba(107,114,128,.35); border-radius: 22px;
            background: rgba(255,255,255,.35);
        }
        #app-overlay .ov-text {
            font: 800 clamp(20px, 3.6vw, 44px)/1.2 "Segoe UI", system-ui, sans-serif;
            letter-spacing: .05em; text-transform: uppercase; text-align: center;
            color: transparent;
            background: linear-gradient(120deg,#9ca3af,#374151 55%,#9ca3af);
            -webkit-background-clip: text; background-clip: text; opacity: .9;
        }
        #app-overlay .ov-bar-track {
            width: min(560px, 74vw); height: 16px; border-radius: 999px;
            background: rgba(107,114,128,.22); overflow: hidden;
        }
        #app-overlay .ov-bar-fill {
            height: 100%; width: 0%; border-radius: 999px;
            background: linear-gradient(90deg, #2563eb, #60a5fa);
            transition: width .25s ease;
        }
        /* Barre indéterminée (reconstruction du cache : pas de progression chiffrée) */
        #app-overlay .ov-bar-track.indeterminate .ov-bar-fill {
            width: 35%; transition: none;
            animation: ov-indet 1.15s ease-in-out infinite;
        }
        @keyframes ov-indet { 0% { transform: translateX(-110%); } 100% { transform: translateX(315%); } }
        #app-overlay .ov-status {
            font: 600 16px "Segoe UI", system-ui, sans-serif; color: #4b5563; letter-spacing: .01em; text-align: center;
        }
        #app-overlay .ov-status b { color: #1d4ed8; }

        /* Bouton plein écran (F11) */
        .fullscreen-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 30px; height: 30px; padding: 0;
            border: 1px solid #d1d5db; border-radius: 7px;
            background: #fff; color: #4b5563; cursor: pointer;
            transition: background .15s, color .15s, border-color .15s;
        }
        .fullscreen-btn:hover { background: #eff6ff; color: #2563eb; border-color: #93c5fd; }
        .fullscreen-btn svg[hidden] { display: none; }

        /* Badge « Cache » cliquable → modale des requêtes */
        .cache-date-badge { cursor: pointer; }
        .cache-date-badge:hover { text-decoration: underline; }

        /* Modale : requêtes de génération du cache */
        .cqm-overlay {
            position: fixed; inset: 0; z-index: 3000;
            background: rgba(15, 23, 42, .45);
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .cqm-overlay[hidden] { display: none; }
        .cqm-box {
            background: #fff; border-radius: 12px; width: min(860px, 96vw);
            max-height: 88vh; display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,.35); overflow: hidden;
        }
        .cqm-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; border-bottom: 1px solid #e5e7eb;
        }
        .cqm-title { font: 700 15px "Segoe UI", system-ui, sans-serif; color: #1f2937; }
        .cqm-close {
            border: none; background: transparent; font-size: 22px; line-height: 1;
            color: #6b7280; cursor: pointer; padding: 0 4px; border-radius: 4px;
        }
        .cqm-close:hover { background: #f3f4f6; color: #111827; }
        .cqm-body { padding: 16px 18px; overflow-y: auto; }
        .cqm-sec { margin-bottom: 18px; }
        .cqm-sec-title { font: 700 13px "Segoe UI", system-ui, sans-serif; color: #1d4ed8; margin: 0 0 6px; }
        .cqm-code {
            margin: 0; background: #0f172a; color: #e2e8f0; border-radius: 8px;
            padding: 12px 14px; font: 12.5px/1.55 "Cascadia Code", Consolas, monospace;
            white-space: pre; overflow-x: auto;
        }
        .cqm-notes { margin: 8px 0 0; padding-left: 18px; }
        .cqm-notes li { font-size: 12.5px; color: #374151; margin: 3px 0; }
        .cqm-foot { font-size: 12px; color: #6b7280; margin: 4px 0 0; }
        .cqm-foot code { background: #f3f4f6; padding: 1px 5px; border-radius: 4px; color: #6d28d9; }
        .cqm-loading { font-size: 13px; color: #6b7280; }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <nav class="header-nav">
                <a href="#" class="nav-link active" data-tab="explorer">Explorateur AD</a>
                <a href="#" class="nav-link" data-tab="regles">Règles<span class="nav-badge" id="nav-regles-count" hidden></span></a>
                <a href="#" class="nav-link" data-tab="allgroupes">GROUPES</a>
                <a href="#" class="nav-link" data-tab="groupes">Fichiers CSVs</a>
            </nav>
        </div>
        <div class="header-right">
            <span id="cache-date" class="cache-date-badge" title="Date de construction du cache utilisateurs"></span>
            <span class="badge-readonly">Lecture seule</span>
            <button id="fullscreen-btn" class="fullscreen-btn" type="button" title="Plein écran (F11)" aria-label="Plein écran">
                <svg class="fs-enter" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
                <svg class="fs-exit" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden><path d="M8 3v3a2 2 0 0 1-2 2H3M21 8h-3a2 2 0 0 1-2-2V3M3 16h3a2 2 0 0 1 2 2v3M16 21v-3a2 2 0 0 1 2-2h3"/></svg>
            </button>
        </div>
    </header>

    <iframe id="frame-explorer" class="tab-frame active" src="/explorer" title="Explorateur AD"></iframe>
    <iframe id="frame-regles"   class="tab-frame"        data-src="/regles"  title="Règles"></iframe>
    <iframe id="frame-groupes"  class="tab-frame"        data-src="/groupes" title="Groupes Dynamiques"></iframe>
    <iframe id="frame-allgroupes" class="tab-frame"      data-src="/allgroupes" title="Groupes — pages HTML" allow="fullscreen"></iframe>

    <div id="app-overlay" hidden>
        <div class="ov-box">
            <div class="ov-text">En attente de<br>génération des groupes…</div>
            <div class="ov-bar-track"><div class="ov-bar-fill" id="ov-bar"></div></div>
            <div class="ov-status" id="ov-status">Préparation…</div>
        </div>
    </div>

    <div id="cache-query-modal" class="cqm-overlay" hidden>
        <div class="cqm-box">
            <div class="cqm-head">
                <span class="cqm-title">Requêtes AD de génération du cache</span>
                <button class="cqm-close" id="cqm-close" type="button" title="Fermer">×</button>
            </div>
            <div class="cqm-body" id="cqm-body"></div>
        </div>
    </div>

    <script>
        const tabs   = document.querySelectorAll('[data-tab]');
        const frames = document.querySelectorAll('.tab-frame');

        function switchTab(name) {
            tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === name));
            frames.forEach(f => {
                const active = f.id === 'frame-' + name;
                f.classList.toggle('active', active);
                if (active && f.dataset.src && f.getAttribute('src') === null) {
                    f.src = f.dataset.src;
                }
                if (active && f.contentWindow) {
                    f.contentWindow.postMessage({ type: 'tab-activated' }, '*');
                }
            });
        }

        tabs.forEach(t => t.addEventListener('click', e => {
            e.preventDefault();
            switchTab(t.dataset.tab);
        }));

        window.switchTab = switchTab;

        // ── Plein écran (F11) ──
        const fsBtn = document.getElementById('fullscreen-btn');
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        }
        function syncFullscreenIcon() {
            const on = !!document.fullscreenElement;
            fsBtn.querySelector('.fs-enter').hidden = on;
            fsBtn.querySelector('.fs-exit').hidden = !on;
            fsBtn.title = on ? 'Quitter le plein écran (F11)' : 'Plein écran (F11)';
        }
        fsBtn.addEventListener('click', toggleFullscreen);
        document.addEventListener('fullscreenchange', syncFullscreenIcon);

        let _cachePollingTimer = null;

        // Badge « Cache (… en cache · … majAD) : <date> » — la date vient de /api/cache/info,
        // les compteurs sont remontés par l'Explorateur AD (postMessage 'cache-stats').
        let _cacheDateStr = null;
        let _cacheCounts  = null;   // { total, majad }
        function renderCacheBadge() {
            const el = document.getElementById('cache-date');
            if (!el) return;
            const c = _cacheCounts
                ? ` (${_cacheCounts.total.toLocaleString('fr-FR')} en cache · ${_cacheCounts.majad.toLocaleString('fr-FR')} majAD)`
                : '';
            el.textContent = _cacheDateStr ? `Cache${c} : ${_cacheDateStr}` : `Cache${c} : absent`;
            el.hidden = false;
        }

        async function refreshCacheDate() {
            try {
                const r = await fetch('/api/cache/info');
                const d = await r.json();
                if (d.builtAt) {
                    const dt = new Date(d.builtAt);
                    const pad = n => String(n).padStart(2, '0');
                    const days   = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
                    const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
                    _cacheDateStr = `${days[dt.getDay()]} ${dt.getDate()} ${months[dt.getMonth()]} ${dt.getFullYear()} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
                } else {
                    _cacheDateStr = null;
                }
                renderCacheBadge();
                return d.builtAt || null;
            } catch { return null; }
        }

        function startCacheDatePolling(knownBuiltAt) {
            if (_cachePollingTimer) clearInterval(_cachePollingTimer);
            const deadline = Date.now() + 10 * 60 * 1000;
            _cachePollingTimer = setInterval(async () => {
                const builtAt = await refreshCacheDate();
                if (builtAt && builtAt !== knownBuiltAt) {
                    clearInterval(_cachePollingTimer);
                    _cachePollingTimer = null;
                }
                if (Date.now() > deadline) {
                    clearInterval(_cachePollingTimer);
                    _cachePollingTimer = null;
                }
            }, 10000);
        }

        refreshCacheDate();
        setInterval(refreshCacheDate, 60000);

        // ── Modale : détail des requêtes AD de génération du cache ──
        const cqmEsc = s => String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
        async function openCacheQueryModal() {
            const modal = document.getElementById('cache-query-modal');
            const body  = document.getElementById('cqm-body');
            body.innerHTML = '<p class="cqm-loading">Chargement…</p>';
            modal.hidden = false;
            try {
                const d = await (await fetch('/api/cache/query-info')).json();
                body.innerHTML = (d.sections || []).map(s =>
                    `<section class="cqm-sec">` +
                        `<h3 class="cqm-sec-title">${cqmEsc(s.title)}</h3>` +
                        `<pre class="cqm-code">${(s.query || []).map(cqmEsc).join('\n')}</pre>` +
                        `<ul class="cqm-notes">${(s.notes || []).map(n => `<li>${cqmEsc(n)}</li>`).join('')}</ul>` +
                    `</section>`
                ).join('') +
                `<p class="cqm-foot">Tag majAD : <code>extensionAttribute15 = ${cqmEsc(d.tag || 'majAD')}</code>` +
                ` · searchBase : <code>${cqmEsc(d.searchBase || '')}</code></p>`;
            } catch (e) {
                body.innerHTML = `<p class="cqm-loading" style="color:#dc2626">Erreur : ${cqmEsc(e.message)}</p>`;
            }
        }
        function closeCacheQueryModal() { document.getElementById('cache-query-modal').hidden = true; }
        document.getElementById('cache-date').addEventListener('click', openCacheQueryModal);
        document.getElementById('cqm-close').addEventListener('click', closeCacheQueryModal);
        document.getElementById('cache-query-modal').addEventListener('click', e => {
            if (e.target.id === 'cache-query-modal') closeCacheQueryModal();
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && !document.getElementById('cache-query-modal').hidden) closeCacheQueryModal();
        });

        // Pastille « nombre total de règles » sur l'onglet Règles
        function setRulesCount(n) {
            const el = document.getElementById('nav-regles-count');
            if (!el) return;
            if (n > 0) { el.textContent = n; el.hidden = false; el.title = `${n} règle${n > 1 ? 's' : ''} définie${n > 1 ? 's' : ''}`; }
            else { el.hidden = true; }
        }
        async function refreshRulesCount() {
            try {
                const r = await fetch('/api/regles');
                const d = await r.json();
                setRulesCount(Array.isArray(d) ? d.length : 0);
            } catch { /* silencieux */ }
        }
        refreshRulesCount();

        window.addEventListener('message', async e => {
            if (e.data?.type === 'cache-rebuilt') {
                const current = await refreshCacheDate();
                startCacheDatePolling(current);
            }
            // La page Règles notifie tout changement (ajout/suppression) → pastille à jour
            if (e.data?.type === 'rules-changed' && typeof e.data.count === 'number') {
                setRulesCount(e.data.count);
            }
            // Compteurs de cache remontés par l'Explorateur AD → badge « Cache (…) »
            if (e.data?.type === 'cache-stats' && typeof e.data.total === 'number') {
                _cacheCounts = { total: e.data.total, majad: e.data.majad };
                renderCacheBadge();
            }
            // La page « Liste Rubrique » a changé → prévenir l'onglet Règles (recharge ses rubriques)
            if (e.data?.type === 'rubriques-changed') {
                const fr = document.getElementById('frame-regles');
                if (fr && fr.contentWindow) fr.contentWindow.postMessage({ type: 'rubriques-changed' }, '*');
            }
            // La page GROUPES demande le bandeau bloquant pendant la génération
            if (e.data?.type === 'groupes-generating') {
                const ov = document.getElementById('app-overlay');
                if (ov) ov.hidden = !e.data.on;
                if (e.data.on) {
                    const bar   = document.getElementById('ov-bar');
                    const track = document.querySelector('#app-overlay .ov-bar-track');
                    const st    = document.getElementById('ov-status');
                    const txt   = document.querySelector('#app-overlay .ov-text');
                    if (txt) txt.innerHTML = e.data.title
                        ? String(e.data.title).replace(/[<>]/g, '')
                        : 'En attente de<br>génération des groupes…';
                    if (track) track.classList.toggle('indeterminate', !!e.data.indeterminate);
                    if (bar) bar.style.width = e.data.indeterminate ? '' : '0%';
                    if (st)  st.textContent = e.data.status || 'Préparation…';
                }
            }
            // Progression de la génération (barre + groupe en cours)
            if (e.data?.type === 'groupes-progress') {
                const bar = document.getElementById('ov-bar');
                const st  = document.getElementById('ov-status');
                const total = e.data.total || 0;
                const done  = e.data.done || 0;
                const pct = total ? Math.round(done / total * 100) : 0;
                if (bar) bar.style.width = pct + '%';
                if (st) st.innerHTML = done + ' / ' + total + (e.data.label ? ' — <b>' + String(e.data.label).replace(/[<>&]/g, '') + '</b>' : '');
            }
        });
    </script>
</body>
</html>
